{% extends 'base.html' %}
{% block title %}Dashboard — Admin{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold text-gray-800">Painel Administrativo</h2>
<p class="text-gray-500 mt-1">Visão geral do sistema</p>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mt-6">
    {% for item in cards %}
    <div class="bg-white rounded-xl shadow p-5 text-center">
        <div class="text-3xl mb-2">{{ item.icone }}</div>
        <h5 class="font-semibold text-gray-700">{{ item.titulo }}</h5>
        <p class="text-gray-400 text-sm mt-1">Em breve</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
