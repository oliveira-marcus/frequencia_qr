{% extends 'base.html' %}
{% block title %}Dashboard — Professor{% endblock %}

{% block content %}
<h2 class="text-2xl font-bold text-gray-800">
    Olá, Prof. {{ perfil.user.get_full_name|default:perfil.user.username }}!
</h2>
<p class="text-gray-500 mt-1">Painel do Professor</p>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
    <div class="bg-white rounded-xl shadow p-5 text-center">
        <div class="text-3xl mb-2">📚</div>
        <h5 class="font-semibold text-gray-700">Minhas Disciplinas</h5>
        <p class="text-gray-400 text-sm mt-1">Em breve</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5 text-center">
        <div class="text-3xl mb-2">🗓️</div>
        <h5 class="font-semibold text-gray-700">Aulas de Hoje</h5>
        <p class="text-gray-400 text-sm mt-1">Em breve</p>
    </div>
    <div class="bg-white rounded-xl shadow p-5 text-center">
        <div class="text-3xl mb-2">📊</div>
        <h5 class="font-semibold text-gray-700">Relatórios</h5>
        <p class="text-gray-400 text-sm mt-1">Em breve</p>
    </div>
</div>
{% endblock %}
