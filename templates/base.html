<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Frequência{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
        <span class="font-bold text-lg">📋 Frequência QR</span>
        {% if user.is_authenticated %}
        <div class="flex items-center gap-4">
            <span class="text-gray-300 text-sm">{{ user.get_full_name|default:user.username }}</span>
            <a href="{% url 'account_logout' %}"
               class="text-sm border border-gray-400 px-3 py-1 rounded hover:bg-gray-700 transition">
                Sair
            </a>
        </div>
        {% endif %}
    </nav>

    <div class="container mx-auto px-4 py-6 max-w-5xl">
        {% if messages %}
            {% for message in messages %}
            <div class="mb-4 px-4 py-3 rounded border
                {% if message.tags == 'error' %} bg-red-100 border-red-400 text-red-700
                {% elif message.tags == 'success' %} bg-green-100 border-green-400 text-green-700
                {% else %} bg-blue-100 border-blue-400 text-blue-700 {% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
