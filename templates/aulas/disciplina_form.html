{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow p-6">
    <h2 class="text-xl font-bold text-gray-800 mb-6">{{ titulo }}</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
            {{ field }}
            {% for error in field.errors %}
                <p class="text-xs text-red-500 mt-1">{{ error }}</p>
            {% endfor %}
        </div>
        {% endfor %}
        <div class="flex gap-3 mt-6">
            <button type="submit"
                    class="bg-gray-800 hover:bg-gray-900 text-white px-5 py-2 rounded-lg transition">
                Salvar
            </button>
            <a href="{% url cancelar_url %}"
               class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-5 py-2 rounded-lg transition">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
